project_id = "recall"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "20MiB"

[auth]
enabled = true
site_url = "recall://"
additional_redirect_urls = ["recall://", "exp://"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Email ownership must be proven in prod (prevents account squatting / spoofed
# signups). Enabled here so `supabase db push` / config push carries it to the
# hosted project. For purely local dev (no inbox) flip back to false temporarily.
enable_confirmations = true

# Google OAuth — set the secrets in .env, not here.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
